<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picverse - Submission</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="icon" type="image/png" href="../Asset/Picverse Logo.png">
    <link rel="stylesheet" href="../css/notificationStyle.css">
</head>
<body>
    <header>
        <a href="Home.html" class="logo">
            <img src="../Asset/Picverse Logo.png" alt="">
            Picverse
        </a>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav class="nav-bar" id="nav-menu">
            <a href="Home.html">Home</a>
            <a href="Gallery.html">Gallery</a>
            <a href="Submission.html" class="selected">Submission</a>
            <a href="Aboutus.html">About Us</a>
            <a href="Notification.html">Notification</a>
            <a href="Login.html" id="auth-btn">Login</a>
        </nav>
    </header>

    <content>
        <div class="form-wrapper">
            <div class="form-container">
                <h1 class="section-title">Submit Your Artwork</h1>
                <form id="submissionForm" action="#" method="post">
                    <div class="form-group" style="display: none;">
                        <label for="email">Email</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Enter your email"
                        />
                        <div class="error" id="emailError"></div>
                    </div>
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input
                            type="text"
                            id="title"
                            name="title"
                            placeholder="Enter your title"
                        />
                        <div class="error" id="titleError"></div>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea
                            id="description"
                            name="description"
                            placeholder="Enter your Description"
                            rows="5"
                        ></textarea>
                        <div class="error" id="descriptionError"></div>
                    </div>
                    <div class="form-group">
                        <label>Tags</label>
                        <div class="tags-selection-container" id="tagsSelectionContainer">
                            <!-- Tag bubbles will be rendered dynamically here -->
                        </div>
                        <div class="custom-tag-group">
                            <input 
                                type="text" 
                                id="customTagInput" 
                                placeholder="Enter custom tag name" 
                            />
                            <button type="button" id="addCustomTagBtn">Add Tag</button>
                        </div>
                        <div class="error" id="tagsError"></div>
                    </div>
                    <div class="form-group">
                        <label for="artwork">Upload File</label>
                        <input 
                            type="file"
                            id="artwork" 
                            name="artwork"
                            placeholder="Choose File"
                        />
                        <div class="error" id="fileError"></div>
                        <div id="previewContainer">
                            <img id="imagePreview" alt="Image Preview">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Is the art AI-generated?</label>
                        <div class="radio-group">
                            <label>
                                <input 
                                    type="radio"
                                    name="aiGenerated"
                                    value="yes"
                                />
                                Yes
                            </label>
                            <label>
                                <input 
                                    type="radio"
                                    name="aiGenerated"
                                    value="no"
                                />
                                No
                            </label>
                        </div>
                        <div class="error" id="aiError"></div>
                    </div>
                    <button type="submit">Submit</button>
                </form>
            </div>
        </div>
    </content>

    <footer>
        <div class="footer-container">
            <nav class="footer-nav">
                <a href="Home.html">Home</a>
                <a href="Gallery.html">Gallery</a>
                <a href="Submission.html">Submission</a>
                <a href="Aboutus.html">About Us</a>
            </nav>
            <a href="Home.html" class="logo-nav">
                <img src="../Asset/Picverse Logo.png" alt="">
                Picverse
            </a>
        </div>
        <div class="footer-bottom">
            &copy; 2025 Picverse.&nbsp;All rights reserved.
        </div> 
    </footer>

    <script src="../JavaScript/config.js"></script>
    <script src="../JavaScript/Scriptsubmission.js"></script>
    <script src="../JavaScript/ScriptHamburger.js"></script>
    <script src="../JavaScript/ScriptNotification.js"></script>
</body>
</html>
