<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picverse - Home</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="icon" type="image/png" href="../Asset/Picverse Logo.png">
</head>

<body id="home-page">
    <header>
        <div class="logo" id="logo">
            <img src="../Asset/Picverse Logo.png" alt="">
            Picverse
        </div>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav class="nav-bar" id="nav-menu">
            <a href="Home.html" class="selected">Home</a>
            <a href="Gallery.html">Gallery</a>
            <a href="Submission.html">Submission</a>
            <a href="Notification.html">Notification</a>
            <a href="Login.html" id="auth-btn">Login</a>
        </nav>
    </header>

    <content>
        <div class="carousel">
            <div class="carousel-caption-fixed">
                <h1>Discover.<br>Share.<br>Inspire.</h1>
                <a href="Gallery.html" class="explore-btn">Explore Gallery</a>
            </div>

            <div class="carousel-slides"></div>

            <div class="carousel-nav">
                <button class="prev">&#10094;</button>
                <button class="next">&#10095;</button>
            </div>
            <div class="carousel-indicators"></div>
        </div>

        <div class="trending">
            <h1 class="section-title">Trending Tags</h1>
            <div class="tags-container">
                <a href="Gallery.html">#digitalart</a>
                <a href="">#fantasy</a>
                <a href="Gallery.html">#AIart</a>
                <a href="">#surreal</a>
                <a href="Gallery.html">#potrait</a>
                <a href="">#anime</a>
            </div>
        </div>

        <div class="featured-artworks">
            <div class="title">
                <h1 class="section-title">Featured Artworks</h1>
                <span>Curated picks from our talented community.</span>
            </div>
            <div class="list-of-artworks home-artworks-list"></div>
        </div>
    </content>

    <footer>
        <div class="footer-container">
            <nav class="footer-nav">
                <a href="Aboutus.html">About Us</a>
            </nav>
            <div class="logo-nav" id="logo-nav">
                <img src="../Asset/Picverse Logo.png" alt="">
                Picverse
            </div>
        </div>
        <div class="footer-bottom">
            &copy; 2026 Picverse.&nbsp;All rights reserved.
        </div>
    </footer>

    <div id="artModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>

            <div class="modal-left">
                <img id="modalImage" src="" alt="">
            </div>
    
            <div class="modal-right">
                <h2 id="modalTitle"></h2>

                <div class="modal-author">
                    <img id="modalProfile" src="" alt="">
                    <span id="modalAuthor"></span>
                </div>
    
                <p id="modalDesc"></p>
    
                <div class="modal-tags" id="modalTags"></div>

                <div class="modal-likes">
                    <span id="modalLikeBtn" style="cursor: pointer; user-select: none;">❤</span>
                    <span id="modalLikes"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="../JavaScript/ScriptHamburger.js"></script>
    <script src="../JavaScript/Scripthome.js"></script>
    <script src="../JavaScript/Scriptlikebtn.js"></script>
</body>

</html>
