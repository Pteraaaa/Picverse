<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picverse Login</title>

    <link rel="stylesheet" href="../CSS/loginStyle.css">
</head>

<body>

    <div class="container">

        <!-- LEFT SIDE -->

        <div class="login-panel">

            <div class="logo">
                Picverse
            </div>

            <p class="subtitle">
                Welcome back to the creative community.
            </p>

            <form id="loginForm">

                <label>Email Address</label>

                <input type="email" id="email" placeholder="artist@picverse.com">

                <small id="emailError"></small>

                <div class="password-row">

                    <label>Password</label>

                    <a href="#">
                        Forgot Password?
                    </a>

                </div>

                <input type="password" id="password" placeholder="Password">

                <small id="passwordError"></small>

                <button type="submit">
                    Sign In
                </button>

                <div class="signup-link">
                    Don't have an account?

                    <a href="SignUp.html">
                        Sign Up
                    </a>
                </div>

            </form>

            <div class="footer">
                © 2024 Picverse
            </div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="image-panel">

            <div class="tag">
                ✨ Trending Digital Series
            </div>

            <div class="info-card">

                <h3>
                    Where art meets opportunity
                </h3>

                <p>
                    Join over 2 million artists and enthusiasts
                    sharing high-fidelity digital works in a
                    professional ecosystem.
                </p>

            </div>

        </div>

    </div>

    <script src="../JavaScript/ScriptLogin.js"></script>

</body>

</html>
